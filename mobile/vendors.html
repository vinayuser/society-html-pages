<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <base href="/mobile/">
  <title>Approved services | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
  <style>
    .vendor-row { display:flex; align-items:flex-start; gap:12px; padding:16px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:10px; border:1px solid var(--border); }
    .vendor-row .vr-body { flex:1; min-width:0; }
    .vendor-row .vr-name { font-weight:700; }
    .vendor-row .vr-meta { font-size:0.85rem; color:var(--text-muted); margin-top:4px; }
    .vendor-row a.tel { color:var(--primary); font-weight:600; text-decoration:none; white-space:nowrap; }
  </style>
</head>
<body>
  <script src="api.js"></script>
  <script src="auth-gate.js"></script>
  <div class="app-shell">
    <header class="app-bar">
      <a href="more.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <h1 class="title">Services</h1>
    </header>
    <main class="app-content no-tabs">
      <p class="page-sub" style="margin-bottom:16px;">Vendors approved by your society for members.</p>
      <div id="vLoading" class="empty-state" style="padding:24px; display:none;"><p class="es-text">Loading…</p></div>
      <div id="vEmpty" class="empty-state" style="padding:24px; display:none;"><p class="es-text">No vendors listed yet. Ask your society office.</p></div>
      <div id="vList"></div>
    </main>
  </div>
  <script>
    (function () {
      var loading = document.getElementById('vLoading');
      var empty = document.getElementById('vEmpty');
      var list = document.getElementById('vList');
      loading.style.display = 'block';
      window.MobileAPI.apiGet('/vendors?limit=100').then(function (r) {
        loading.style.display = 'none';
        var rows = window.MobileAPI.listFrom(r);
        if (!rows.length) { empty.style.display = 'block'; return; }
        rows.forEach(function (v) {
          var div = document.createElement('div');
          div.className = 'vendor-row';
          var phone = v.phone ? '<a class="tel" href="tel:' + String(v.phone).replace(/\s/g, '') + '"><i class="fas fa-phone"></i></a>' : '';
          div.innerHTML = '<div class="vr-body"><div class="vr-name">' + String(v.vendorName || '').replace(/</g, '&lt;') + '</div><div class="vr-meta">' + String(v.category || 'Service').replace(/</g, '&lt;') + (v.description ? ' · ' + String(v.description).substring(0, 80).replace(/</g, '&lt;') : '') + '</div></div>' + phone;
          list.appendChild(div);
        });
      }).catch(function () {
        loading.style.display = 'none';
        empty.style.display = 'block';
        empty.querySelector('.es-text').textContent = 'Unable to load vendors. Member access only.';
      });
    })();
  </script>
</body>
</html>
