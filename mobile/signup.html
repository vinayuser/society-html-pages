<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <base href="/mobile/">
  <title>Sign up | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
  <style>
    .signup-page { min-height: 100vh; padding: 20px 18px 32px; max-width: 400px; margin: 0 auto; padding-top: 28px; }
    .signup-page .logo-wrap { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: #fff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .signup-page h1 { font-size: 1.3rem; margin: 0 0 4px 0; color: var(--text); }
    .signup-page .sub { color: var(--text-muted); font-size: 0.88rem; margin: 0 0 16px 0; line-height: 1.4; }
    .signup-page .card { border-radius: var(--radius-lg); background: var(--bg-card); box-shadow: var(--shadow-md); padding: 18px 16px; border: 1px solid var(--border); overflow: hidden; }
    .step-dots { display: flex; justify-content: center; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; max-width: 100%; }
    .step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.35s ease, transform 0.35s ease; }
    .step-dot.active { background: var(--primary); transform: scale(1.25); }
    .step-dot.done { background: var(--primary); opacity: 0.4; }
    .step-label { text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 14px; min-height: 2.6em; line-height: 1.35; transition: opacity 0.3s ease; }
    .step-label strong { color: var(--primary); }
    .wizard-viewport { overflow: hidden; width: 100%; }
    .wizard-track { display: flex; transition: transform 0.48s cubic-bezier(0.25, 0.85, 0.35, 1); will-change: transform; }
    .wizard-slide { flex-shrink: 0; padding-right: 8px; box-sizing: border-box; opacity: 0.4; transition: opacity 0.4s ease; }
    .wizard-slide.is-current { opacity: 1; }
    .signup-page .form-group { margin-bottom: 14px; }
    .signup-page .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; color: var(--text); }
    .signup-page .form-group input,
    .signup-page .form-group select { width: 100%; padding: 12px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 1rem; box-sizing: border-box; }
    .signup-page .form-group input[readonly] { background: rgba(0,0,0,0.04); color: var(--text-secondary); }
    .signup-page .form-group input:focus,
    .signup-page .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .location-summary { font-size: 0.8rem; color: var(--text-muted); background: rgba(124, 58, 237, 0.08); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border); line-height: 1.35; }
    .wizard-nav { display: flex; gap: 10px; margin-top: 16px; }
    .signup-page .btn-block { flex: 1; padding: 14px 12px; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600; border: none; cursor: pointer; }
    .signup-page .btn-next { background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: #fff; }
    .signup-page .btn-next:disabled { opacity: 0.75; cursor: not-allowed; }
    .signup-page .btn-back { background: var(--border); color: var(--text); }
    .signup-page .error-msg { color: var(--danger); font-size: 0.88rem; margin-top: 10px; display: none; }
    .signup-page .error-msg.show { display: block; }
    .signup-page .back-link { display: inline-block; margin-bottom: 14px; color: var(--primary); font-weight: 600; font-size: 0.88rem; text-decoration: none; }
    #successCard { display: none; text-align: center; }
    #successCard.show { display: block; }
    #formCard.hide { display: none; }
    .hint { font-size: 0.78rem; color: var(--text-muted); margin: -6px 0 0 0; line-height: 1.35; }
    .otp-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="signup-page">
    <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to sign in</a>
    <div class="logo-wrap"><i class="fas fa-building"></i></div>
    <h1>Create account</h1>
    <p class="sub">Verify email or phone, then choose your society. Admin approves before you can sign in.</p>

    <div id="formCard" class="card">
      <div class="step-dots" id="stepDots"></div>
      <p class="step-label" id="stepLabel"></p>

      <div class="wizard-viewport">
        <div class="wizard-track" id="wizardTrack">
          <div class="wizard-slide is-current" data-step="0">
            <div class="form-group">
              <label for="contact">Email or mobile *</label>
              <input type="text" id="contact" placeholder="you@example.com or +91 9876543210" autocomplete="username">
            </div>
            <p class="hint">Demo OTP: <strong>000000</strong></p>
          </div>
          <div class="wizard-slide" data-step="1">
            <div class="form-group">
              <label for="otp">6-digit OTP *</label>
              <input type="text" id="otp" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
            </div>
            <p class="otp-hint" id="otpMasked"></p>
          </div>
          <div class="wizard-slide" data-step="2">
            <div class="form-group">
              <label for="countryId">Country *</label>
              <select id="countryId"><option value="">Loading…</option></select>
            </div>
            <p class="hint">Select your country.</p>
          </div>
          <div class="wizard-slide" data-step="3">
            <div class="form-group">
              <label for="stateId">State / Province *</label>
              <select id="stateId" disabled><option value="">Select country first</option></select>
            </div>
          </div>
          <div class="wizard-slide" data-step="4">
            <div class="form-group">
              <label for="cityId">City *</label>
              <select id="cityId" disabled><option value="">Select state first</option></select>
            </div>
          </div>
          <div class="wizard-slide" data-step="5">
            <div class="location-summary" id="locationSummary"></div>
            <div class="form-group">
              <label for="societyId">Society *</label>
              <select id="societyId" disabled><option value="">Select city first</option></select>
            </div>
          </div>
          <div class="wizard-slide" data-step="6">
            <div class="form-group">
              <label for="name">Full name *</label>
              <input type="text" id="name" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel">
            </div>
            <div class="form-group">
              <label for="tower">Tower / Block *</label>
              <select id="tower" disabled><option value="">Select society first</option></select>
            </div>
            <div class="form-group">
              <label for="flatId">Flat *</label>
              <select id="flatId" disabled><option value="">Select tower first</option></select>
            </div>
            <div class="form-group">
              <label for="password">Password * (min 6)</label>
              <input type="password" id="password" placeholder="••••••••" minlength="6" autocomplete="new-password">
            </div>
          </div>
        </div>
      </div>

      <p id="formError" class="error-msg"></p>
      <div class="wizard-nav">
        <button type="button" class="btn-block btn-back" id="btnBack" style="display:none; flex:0.85;">Back</button>
        <button type="button" class="btn-block btn-next" id="btnNext">Continue</button>
      </div>
    </div>

    <div id="successCard" class="card">
      <div class="logo-wrap mx-auto" style="margin:0 auto 12px;"><i class="fas fa-check"></i></div>
      <p class="success-msg show" id="successMsg" style="color:var(--success); font-size:0.95rem;">Request submitted. Society admin will review.</p>
      <a href="login.html" class="btn-block btn-back" style="display:block; text-align:center; text-decoration:none; margin-top:14px;">Go to sign in</a>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    (function () {
      if (typeof window.API_BASE === 'undefined' || window.API_BASE === '') {
        window.API_BASE = 'http://localhost:3000';
      }
      var base = (window.API_BASE || '').replace(/\/$/, '');
      function url(path) {
        var p = (path || '').replace(/^\//, '');
        return base ? base + '/' + p : path;
      }
      function listFromResponse(data) {
        if (!data || !data.success) return [];
        if (data.Collection && Array.isArray(data.Collection.data)) return data.Collection.data;
        if (Array.isArray(data.data)) return data.data;
        return [];
      }
      function fetchList(apiPath) {
        return fetch(url(apiPath)).then(function (r) { return r.json(); }).then(listFromResponse);
      }
      function escapeHtml(str) {
        if (!str) return '';
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      var TOTAL_STEPS = 7;
      var stepTitles = [
        'Step 1 of 7 — Email or phone',
        'Step 2 of 7 — OTP',
        'Step 3 of 7 — Country',
        'Step 4 of 7 — State',
        'Step 5 of 7 — City',
        'Step 6 of 7 — Society',
        'Step 7 of 7 — Your details'
      ];

      var signupSessionToken = null;
      var verifiedContactType = null;
      var verifiedContact = null;

      /** Numeric society id for API calls (avoids /societies/NaN/...). */
      var selectedSocietyId = null;

      function getSelectedSocietyId() {
        var raw = societySelect.value;
        if (raw === '' || raw == null) return null;
        var n = parseInt(String(raw).trim(), 10);
        return Number.isFinite(n) && n > 0 ? n : null;
      }

      var currentStep = 0;
      var track = document.getElementById('wizardTrack');
      var btnNext = document.getElementById('btnNext');
      var btnBack = document.getElementById('btnBack');
      var stepLabel = document.getElementById('stepLabel');
      var slides = track.querySelectorAll('.wizard-slide');

      var contactInput = document.getElementById('contact');
      var otpInput = document.getElementById('otp');
      var otpMasked = document.getElementById('otpMasked');
      var countrySelect = document.getElementById('countryId');
      var stateSelect = document.getElementById('stateId');
      var citySelect = document.getElementById('cityId');
      var societySelect = document.getElementById('societyId');
      var towerSelect = document.getElementById('tower');
      var flatSelect = document.getElementById('flatId');
      var emailInput = document.getElementById('email');
      var phoneInput = document.getElementById('phone');

      var locationSummary = document.getElementById('locationSummary');

      var dotsWrap = document.getElementById('stepDots');
      for (var d = 0; d < TOTAL_STEPS; d++) {
        var dot = document.createElement('span');
        dot.className = 'step-dot' + (d === 0 ? ' active' : '');
        dotsWrap.appendChild(dot);
      }
      var dots = dotsWrap.querySelectorAll('.step-dot');

      function layoutSlides() {
        track.style.width = (TOTAL_STEPS * 100) + '%';
        var pct = 100 / TOTAL_STEPS;
        for (var i = 0; i < slides.length; i++) {
          slides[i].style.flex = '0 0 ' + pct + '%';
        }
      }

      function updateDots() {
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.remove('active', 'done');
          if (i < currentStep) dots[i].classList.add('done');
          else if (i === currentStep) dots[i].classList.add('active');
        }
      }
      function updateSlideOpacity() {
        for (var i = 0; i < slides.length; i++) {
          slides[i].classList.toggle('is-current', i === currentStep);
        }
      }
      function goToStep(i) {
        currentStep = Math.max(0, Math.min(TOTAL_STEPS - 1, i));
        var stepPct = 100 / TOTAL_STEPS;
        track.style.transform = 'translateX(-' + (currentStep * stepPct) + '%)';
        updateDots();
        updateSlideOpacity();
        var raw = stepTitles[currentStep];
        var segs = raw.split(' — ');
        var head = segs[0].replace(/Step (\d+) of (\d+)/, '<strong>Step $1</strong> of $2');
        stepLabel.innerHTML = segs.length > 1 ? head + ' — ' + escapeHtml(segs[1]) : head;
        btnBack.style.display = currentStep > 0 ? 'block' : 'none';
        btnNext.textContent = currentStep === TOTAL_STEPS - 1 ? 'Submit request' : 'Continue';
      }

      function selectedText(sel) {
        var opt = sel.options[sel.selectedIndex];
        return opt ? opt.textContent : '';
      }
      function refreshLocationSummary() {
        if (countrySelect.value && stateSelect.value && citySelect.value) {
          locationSummary.innerHTML = '<i class="fas fa-map-marker-alt"></i> <strong>' + escapeHtml(selectedText(citySelect)) + '</strong>, ' + escapeHtml(selectedText(stateSelect)) + ', ' + escapeHtml(selectedText(countrySelect));
        } else locationSummary.textContent = '';
      }

      function applyVerifiedContactToDetails() {
        emailInput.removeAttribute('readonly');
        phoneInput.removeAttribute('readonly');
        if (verifiedContactType === 'email') {
          emailInput.value = verifiedContact;
          emailInput.setAttribute('readonly', 'readonly');
        } else if (verifiedContactType === 'phone') {
          phoneInput.value = verifiedContact;
          phoneInput.setAttribute('readonly', 'readonly');
        }
      }

      function loadCountries() {
        return fetchList('/locations/countries?limit=500').then(function (list) {
          countrySelect.innerHTML = '<option value="">Select country</option>';
          list.forEach(function (c) {
            var o = document.createElement('option');
            o.value = c.id;
            o.textContent = c.name;
            countrySelect.appendChild(o);
          });
        }).catch(function () { countrySelect.innerHTML = '<option value="">Unable to load</option>'; });
      }
      function loadStates(countryId) {
        stateSelect.innerHTML = '<option value="">Loading…</option>';
        stateSelect.disabled = true;
        if (!countryId) { stateSelect.innerHTML = '<option value="">Select country first</option>'; return Promise.resolve(); }
        return fetchList('/locations/states?countryId=' + encodeURIComponent(countryId) + '&limit=500').then(function (list) {
          stateSelect.innerHTML = '<option value="">Select state</option>';
          list.forEach(function (s) {
            var o = document.createElement('option');
            o.value = s.id;
            o.textContent = s.name;
            stateSelect.appendChild(o);
          });
          stateSelect.disabled = list.length === 0;
        }).catch(function () { stateSelect.innerHTML = '<option value="">Error loading</option>'; });
      }
      function loadCities(stateId) {
        citySelect.innerHTML = '<option value="">Loading…</option>';
        citySelect.disabled = true;
        if (!stateId) { citySelect.innerHTML = '<option value="">Select state first</option>'; return Promise.resolve(); }
        return fetchList('/locations/cities?stateId=' + encodeURIComponent(stateId) + '&limit=500').then(function (list) {
          citySelect.innerHTML = '<option value="">Select city</option>';
          list.forEach(function (c) {
            var o = document.createElement('option');
            o.value = c.id;
            o.textContent = c.name;
            citySelect.appendChild(o);
          });
          citySelect.disabled = list.length === 0;
        }).catch(function () { citySelect.innerHTML = '<option value="">Error loading</option>'; });
      }
      function loadSocieties() {
        var cid = countrySelect.value, sid = stateSelect.value, cityId = citySelect.value;
        societySelect.innerHTML = '<option value="">Loading…</option>';
        societySelect.disabled = true;
        if (!cid || !sid || !cityId) return Promise.resolve();
        var q = '?countryId=' + encodeURIComponent(cid) + '&stateId=' + encodeURIComponent(sid) + '&cityId=' + encodeURIComponent(cityId) + '&limit=500';
        return fetch(url('/societies/list' + q)).then(function (r) { return r.json(); }).then(function (data) {
          var list = listFromResponse(data);
          societySelect.innerHTML = '<option value="">Select society</option>';
          list.forEach(function (s) {
            if (s == null || s.id == null || s.id === '') return;
            var o = document.createElement('option');
            o.value = String(s.id);
            o.textContent = s.name + (s.alias ? ' (' + s.alias + ')' : '');
            societySelect.appendChild(o);
          });
          societySelect.disabled = list.length === 0;
          if (list.length === 0) societySelect.innerHTML = '<option value="">No societies here</option>';
        }).catch(function () { societySelect.innerHTML = '<option value="">Unable to load</option>'; });
      }
      function loadTowers(societyId) {
        towerSelect.innerHTML = '<option value="">Select tower</option>';
        flatSelect.innerHTML = '<option value="">Select tower first</option>';
        flatSelect.disabled = true;
        var sid = societyId != null && Number.isFinite(societyId) && societyId > 0 ? societyId : null;
        if (!sid) { towerSelect.disabled = true; return; }
        towerSelect.disabled = false;
        fetch(url('/societies/' + sid + '/towers')).then(function (r) { return r.json(); }).then(function (data) {
          var arr = listFromResponse(data);
          towerSelect.innerHTML = '<option value="">Select tower</option>';
          arr.forEach(function (t) {
            var o = document.createElement('option');
            o.value = t;
            o.textContent = t;
            towerSelect.appendChild(o);
          });
        }).catch(function () { towerSelect.innerHTML = '<option value="">Error</option>'; });
      }
      function loadFlats(societyId, tower) {
        flatSelect.innerHTML = '<option value="">Loading…</option>';
        flatSelect.disabled = true;
        var sid = societyId != null && Number.isFinite(societyId) && societyId > 0 ? societyId : null;
        if (!sid) {
          flatSelect.innerHTML = '<option value="">Select society first</option>';
          return;
        }
        var q = tower ? '?tower=' + encodeURIComponent(tower) : '';
        fetch(url('/societies/' + sid + '/flats' + q)).then(function (r) { return r.json(); }).then(function (data) {
          var list = listFromResponse(data);
          flatSelect.innerHTML = '<option value="">Select flat</option>';
          list.forEach(function (f) {
            var o = document.createElement('option');
            o.value = f.id;
            o.textContent = f.tower + ' – ' + (f.flatNumber || f.flat_number || '');
            o.dataset.tower = f.tower;
            o.dataset.flatNumber = f.flatNumber || f.flat_number || '';
            flatSelect.appendChild(o);
          });
          flatSelect.disabled = list.length === 0;
        }).catch(function () { flatSelect.innerHTML = '<option value="">Error</option>'; });
      }

      countrySelect.addEventListener('change', function () {
        stateSelect.innerHTML = '<option value="">Select country first</option>';
        citySelect.innerHTML = '<option value="">Select state first</option>';
        citySelect.disabled = true;
        societySelect.innerHTML = '<option value="">Select city first</option>';
        societySelect.disabled = true;
        loadStates(countrySelect.value);
      });
      stateSelect.addEventListener('change', function () {
        citySelect.innerHTML = '<option value="">Select state first</option>';
        societySelect.innerHTML = '<option value="">Select city first</option>';
        societySelect.disabled = true;
        loadCities(stateSelect.value);
      });
      citySelect.addEventListener('change', refreshLocationSummary);
      societySelect.addEventListener('change', function () {
        selectedSocietyId = getSelectedSocietyId();
        loadTowers(selectedSocietyId);
      });
      towerSelect.addEventListener('change', function () {
        var sid = selectedSocietyId != null ? selectedSocietyId : getSelectedSocietyId();
        if (sid == null) {
          showErr('Select a society on the previous step first.');
          return;
        }
        loadFlats(sid, towerSelect.value || '');
      });

      function showErr(msg) {
        var err = document.getElementById('formError');
        err.textContent = msg || '';
        err.classList.toggle('show', !!msg);
      }

      function validateStep() {
        showErr('');
        if (currentStep === 0) {
          if (contactInput.value.trim().length < 3) { showErr('Enter your email or mobile number.'); return false; }
          return true;
        }
        if (currentStep === 1) {
          if (!/^\d{6}$/.test(otpInput.value.trim())) { showErr('Enter the 6-digit OTP.'); return false; }
          return true;
        }
        if (currentStep === 2 && !countrySelect.value) { showErr('Select a country.'); return false; }
        if (currentStep === 3 && !stateSelect.value) { showErr('Select a state.'); return false; }
        if (currentStep === 4 && !citySelect.value) { showErr('Select a city.'); return false; }
        if (currentStep === 5 && !societySelect.value) { showErr('Select a society.'); return false; }
        if (currentStep === 6) {
          var name = document.getElementById('name').value.trim();
          var email = emailInput.value.trim();
          var flatOpt = flatSelect.options[flatSelect.selectedIndex];
          var tower = flatOpt && flatOpt.dataset ? flatOpt.dataset.tower : '';
          var flatNumber = flatOpt && flatOpt.dataset ? flatOpt.dataset.flatNumber : '';
          var password = document.getElementById('password').value;
          if (!name || !email || !tower || !flatNumber || !password || password.length < 6) {
            showErr('Fill all required fields. Password min 6 characters.');
            return false;
          }
        }
        return true;
      }

      function requestSignupOtp() {
        return fetch(url('/auth/signup-otp/request'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: contactInput.value.trim() }),
        }).then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); });
      }
      function verifySignupOtp() {
        return fetch(url('/auth/signup-otp/verify'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: contactInput.value.trim(), otp: otpInput.value.trim() }),
        }).then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); });
      }

      btnNext.addEventListener('click', function () {
        if (!validateStep()) return;

        if (currentStep === 0) {
          btnNext.disabled = true;
          requestSignupOtp().then(function (result) {
            if (result.ok && result.data.success) {
              var m = (result.data.data && result.data.data.maskedContact) ? result.data.data.maskedContact : '';
              otpMasked.textContent = m ? ('Code sent to ' + m) : '';
              goToStep(1);
            } else {
              showErr((result.data && result.data.message) || 'Could not send OTP.');
            }
            btnNext.disabled = false;
          }).catch(function () {
            showErr('Network error.');
            btnNext.disabled = false;
          });
          return;
        }

        if (currentStep === 1) {
          btnNext.disabled = true;
          verifySignupOtp().then(function (result) {
            if (result.ok && result.data.success && result.data.data && result.data.data.signupSessionToken) {
              signupSessionToken = result.data.data.signupSessionToken;
              verifiedContactType = result.data.data.contactType;
              verifiedContact = result.data.data.contact;
              applyVerifiedContactToDetails();
              goToStep(2);
            } else {
              showErr((result.data && result.data.message) || 'Invalid OTP. Use 000000.');
            }
            btnNext.disabled = false;
          }).catch(function () {
            showErr('Network error.');
            btnNext.disabled = false;
          });
          return;
        }

        if (currentStep < TOTAL_STEPS - 1) {
          var next = currentStep + 1;
          if (currentStep === 4) {
            refreshLocationSummary();
            loadSocieties().then(function () { goToStep(next); });
            return;
          }
          goToStep(next);
          if (next === 6) {
            selectedSocietyId = getSelectedSocietyId();
            if (selectedSocietyId != null) {
              loadTowers(selectedSocietyId);
              if (towerSelect.value) loadFlats(selectedSocietyId, towerSelect.value);
            }
          }
          return;
        }

        var societyId = getSelectedSocietyId();
        if (societyId == null) {
          showErr('Invalid society. Go back and select your society again.');
          return;
        }
        var countryId = parseInt(countrySelect.value, 10);
        var stateId = parseInt(stateSelect.value, 10);
        var cityId = parseInt(citySelect.value, 10);
        var name = document.getElementById('name').value.trim();
        var email = emailInput.value.trim();
        var phone = phoneInput.value.trim();
        var flatOpt = flatSelect.options[flatSelect.selectedIndex];
        var tower = flatOpt && flatOpt.dataset ? flatOpt.dataset.tower : '';
        var flatNumber = flatOpt && flatOpt.dataset ? flatOpt.dataset.flatNumber : '';
        var password = document.getElementById('password').value;

        btnNext.disabled = true;
        btnNext.textContent = 'Submitting…';
        fetch(url('/signup-requests'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            signupSessionToken: signupSessionToken,
            societyId: societyId,
            countryId: countryId,
            stateId: stateId,
            cityId: cityId,
            name: name,
            email: email,
            phone: phone || undefined,
            tower: tower,
            flatNumber: flatNumber,
            password: password,
          }),
        })
          .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
          .then(function (result) {
            if (result.ok && result.data.success) {
              document.getElementById('formCard').classList.add('hide');
              document.getElementById('successCard').classList.add('show');
              if (result.data.data && result.data.data.message) {
                document.getElementById('successMsg').textContent = result.data.data.message;
              }
            } else {
              showErr((result.data && result.data.message) || 'Request failed.');
              btnNext.disabled = false;
              btnNext.textContent = 'Submit request';
            }
          })
          .catch(function () {
            showErr('Network error.');
            btnNext.disabled = false;
            btnNext.textContent = 'Submit request';
          });
      });

      btnBack.addEventListener('click', function () {
        showErr('');
        if (currentStep > 0) goToStep(currentStep - 1);
      });

      layoutSlides();
      goToStep(0);
      loadCountries();
    })();
  </script>
</body>
</html>
