<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <base href="/mobile/">
  <title>Sign in | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
  <style>
    .login-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; max-width: 360px; margin: 0 auto; }
    .login-page .logo-wrap { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: #fff; font-size: 1.75rem; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(124,58,237,0.35); }
    .login-page h1 { font-size: 1.5rem; margin: 0 0 4px 0; color: var(--text); }
    .login-page .sub { color: var(--text-muted); font-size: 0.9rem; margin: 0 0 28px 0; }
    .login-page .card { width: 100%; border-radius: var(--radius-lg); background: var(--bg-card); box-shadow: var(--shadow-md); padding: 24px; border: 1px solid var(--border); }
    .login-page .form-group { margin-bottom: 18px; }
    .login-page .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; color: var(--text); }
    .login-page .form-group input { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 1rem; box-sizing: border-box; }
    .login-page .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .login-page .btn-block { width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600; border: none; cursor: pointer; background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: #fff; margin-top: 8px; }
    .login-page .btn-block:disabled { opacity: 0.8; cursor: not-allowed; }
    .login-page .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 12px; text-align: center; display: none; }
    .login-page .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="logo-wrap"><i class="fas fa-building"></i></div>
    <h1>SocietyHub</h1>
    <p class="sub">Sign in to your society account</p>
    <div class="card">
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <p id="errorMsg" class="error-msg"></p>
        <button type="submit" class="btn-block" id="submitBtn">Sign in</button>
        <p style="text-align:center; margin-top:16px; font-size:0.9rem;">
          <a href="signup.html" style="color:var(--primary); font-weight:600;">Create account / Sign up</a>
        </p>
      </form>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    (function () {
      if (window.MobileAPI && window.MobileAPI.isLoggedIn()) {
        var returnUrl = (new URLSearchParams(window.location.search).get('returnUrl')) || 'index.html';
        window.location.replace(returnUrl);
        return;
      }
      var form = document.getElementById('loginForm');
      var errorMsg = document.getElementById('errorMsg');
      var submitBtn = document.getElementById('submitBtn');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorMsg.classList.remove('show');
        errorMsg.textContent = '';
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        if (!email || !password) {
          errorMsg.textContent = 'Please enter email and password';
          errorMsg.classList.add('show');
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';
        var base = (window.API_BASE || '').replace(/\/$/, '');
        var url = base ? base + '/auth/login' : '/auth/login';
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        })
          .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
          .then(function (result) {
            if (result.ok && result.data.success && result.data.data) {
              var d = result.data.data;
              if (d.accessToken) window.MobileAPI.setToken(d.accessToken);
              if (d.user) window.MobileAPI.setUser(d.user);
              var returnUrl = (new URLSearchParams(window.location.search).get('returnUrl')) || 'index.html';
              window.location.replace(returnUrl);
            } else {
              errorMsg.textContent = (result.data && result.data.message) || 'Invalid email or password';
              errorMsg.classList.add('show');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Sign in';
            }
          })
          .catch(function () {
            errorMsg.textContent = 'Network error. Please try again.';
            errorMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          });
      });
    })();
  </script>
</body>
</html>
