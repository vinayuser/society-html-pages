<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <base href="/mobile/">
  <title>Add Delivery | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <header class="app-bar">
      <a href="deliveries.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <h1 class="title">Add Delivery</h1>
    </header>
    <main class="app-content no-tabs">
      <form>
        <div class="form-group">
          <label>Flat Number *</label>
          <select required>
            <option value="">Select flat</option>
            <option>A-101</option>
            <option>B-302</option>
            <option>C-204</option>
          </select>
        </div>
        <div class="form-group">
          <label>Delivery Type</label>
          <select>
            <option>Courier</option>
            <option>Food</option>
            <option>E-commerce</option>
          </select>
        </div>
        <button type="submit" class="btn-block btn-primary">Log Delivery</button>
      </form>
    </main>
  </div>
</body>
</html>
