<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <base href="/mobile/">
  <title>Marketplace | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <header class="app-bar">
      <a href="more.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <h1 class="title">Marketplace</h1>
      <button type="button" class="icon-btn"><i class="fas fa-plus"></i></button>
    </header>
    <main class="app-content no-tabs">
      <div class="tile-grid">
        <div class="tile">
          <div class="tile-img"><i class="fas fa-couch"></i></div>
          <div class="tile-body">
            <div class="tile-title">Sofa Set</div>
            <div class="tile-price">Rs 25,000</div>
            <div class="tile-meta">B-302</div>
            <a href="#" class="btn-contact">Contact</a>
          </div>
        </div>
        <div class="tile">
          <div class="tile-img"><i class="fas fa-bicycle"></i></div>
          <div class="tile-body">
            <div class="tile-title">Kids Bicycle</div>
            <div class="tile-price">Rs 3,500</div>
            <div class="tile-meta">A-101</div>
            <a href="#" class="btn-contact">Contact</a>
          </div>
        </div>
        <div class="tile">
          <div class="tile-img"><i class="fas fa-laptop"></i></div>
          <div class="tile-body">
            <div class="tile-title">Study Table</div>
            <div class="tile-price">Rs 8,000</div>
            <div class="tile-meta">C-204</div>
            <a href="#" class="btn-contact">Contact</a>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
