<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <base href="/mobile/">
  <title>Sign up | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
  <style>
    .signup-page { min-height: 100vh; padding: 24px; max-width: 360px; margin: 0 auto; padding-top: 40px; }
    .signup-page .logo-wrap { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: #fff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .signup-page h1 { font-size: 1.35rem; margin: 0 0 4px 0; color: var(--text); }
    .signup-page .sub { color: var(--text-muted); font-size: 0.9rem; margin: 0 0 20px 0; }
    .signup-page .card { border-radius: var(--radius-lg); background: var(--bg-card); box-shadow: var(--shadow-md); padding: 24px; border: 1px solid var(--border); margin-bottom: 16px; }
    .signup-page .form-group { margin-bottom: 16px; }
    .signup-page .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; color: var(--text); }
    .signup-page .form-group input,
    .signup-page .form-group select { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 1rem; box-sizing: border-box; }
    .signup-page .form-group input:focus,
    .signup-page .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .signup-page .btn-block { width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600; border: none; cursor: pointer; background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: #fff; margin-top: 8px; }
    .signup-page .btn-block:disabled { opacity: 0.8; cursor: not-allowed; }
    .signup-page .btn-secondary { background: var(--border); color: var(--text); margin-top: 8px; }
    .signup-page .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 8px; display: none; }
    .signup-page .error-msg.show { display: block; }
    .signup-page .success-msg { color: var(--success); font-size: 0.95rem; margin-top: 12px; display: none; }
    .signup-page .success-msg.show { display: block; }
    .signup-page .back-link { display: inline-block; margin-bottom: 16px; color: var(--primary); font-weight: 600; font-size: 0.9rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="signup-page">
    <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to sign in</a>
    <div class="logo-wrap"><i class="fas fa-building"></i></div>
    <h1>Create account</h1>
    <p class="sub">Request to join your society. Admin will approve before you can sign in.</p>

    <div id="formCard" class="card">
      <form id="signupForm">
        <div class="form-group">
          <label>Society *</label>
          <select id="societyId" required>
            <option value="">Select your society</option>
          </select>
        </div>
        <div class="form-group">
          <label>Full name *</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Phone (optional)</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel">
        </div>
        <div class="form-group">
          <label>Tower / Block *</label>
          <select id="tower" required disabled>
            <option value="">Select society first</option>
          </select>
        </div>
        <div class="form-group">
          <label>Flat *</label>
          <select id="flatId" required disabled>
            <option value="">Select tower first</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password * (min 6 characters)</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
        </div>
        <p id="formError" class="error-msg"></p>
        <button type="submit" class="btn-block" id="submitBtn">Submit request</button>
      </form>
    </div>

    <div id="successCard" class="card" style="display:none;">
      <p class="success-msg show" id="successMsg">Request submitted. Society admin will review. You can sign in after approval.</p>
      <a href="login.html" class="btn-block btn-secondary" style="display:block; text-align:center; text-decoration:none; margin-top:16px;">Go to sign in</a>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    (function () {
      var base = (window.API_BASE || '').replace(/\/$/, '');
      function url(path) {
        var p = (path || '').replace(/^\//, '');
        return base ? base + '/' + p : path;
      }
      var societySelect = document.getElementById('societyId');
      var towerSelect = document.getElementById('tower');
      var flatSelect = document.getElementById('flatId');

      function loadTowers(societyId) {
        towerSelect.innerHTML = '<option value="">Select tower / block</option>';
        flatSelect.innerHTML = '<option value="">Select tower first</option>';
        flatSelect.disabled = true;
        if (!societyId) { towerSelect.disabled = true; return; }
        towerSelect.disabled = false;
        fetch(url('/societies/' + societyId + '/towers'))
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.success && data.data && data.data.length) {
              data.data.forEach(function (t) {
                var o = document.createElement('option');
                o.value = t;
                o.textContent = t;
                towerSelect.appendChild(o);
              });
            }
          })
          .catch(function () { towerSelect.innerHTML = '<option value="">Unable to load</option>'; });
      }

      function loadFlats(societyId, tower) {
        flatSelect.innerHTML = '<option value="">Loading…</option>';
        flatSelect.disabled = true;
        var q = tower ? '?tower=' + encodeURIComponent(tower) : '';
        fetch(url('/societies/' + societyId + '/flats' + q))
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var list = data.success && data.data ? data.data : [];
            flatSelect.innerHTML = '<option value="">Select flat</option>';
            list.forEach(function (f) {
              var o = document.createElement('option');
              o.value = f.id;
              o.textContent = f.tower + ' – ' + (f.flatNumber || f.flat_number || '');
              o.dataset.tower = f.tower;
              o.dataset.flatNumber = f.flatNumber || f.flat_number || '';
              flatSelect.appendChild(o);
            });
            flatSelect.disabled = list.length === 0;
          })
          .catch(function () {
            flatSelect.innerHTML = '<option value="">Unable to load</option>';
          });
      }

      societySelect.addEventListener('change', function () {
        var sid = societySelect.value ? parseInt(societySelect.value, 10) : null;
        loadTowers(sid);
      });

      towerSelect.addEventListener('change', function () {
        var sid = societySelect.value ? parseInt(societySelect.value, 10) : null;
        var t = towerSelect.value || '';
        if (!sid) return;
        loadFlats(sid, t);
      });

      fetch(url('/societies/list'))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success && data.data && data.data.length) {
            data.data.forEach(function (s) {
              var o = document.createElement('option');
              o.value = s.id;
              o.textContent = s.name + (s.alias ? ' (' + s.alias + ')' : '');
              societySelect.appendChild(o);
            });
          } else {
            societySelect.innerHTML = '<option value="">No societies available</option>';
          }
        })
        .catch(function () {
          societySelect.innerHTML = '<option value="">Unable to load societies</option>';
        });

      document.getElementById('signupForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('formError');
        var btn = document.getElementById('submitBtn');
        err.classList.remove('show');
        err.textContent = '';
        var societyId = parseInt(document.getElementById('societyId').value, 10);
        var name = document.getElementById('name').value.trim();
        var email = document.getElementById('email').value.trim();
        var phone = document.getElementById('phone').value.trim();
        var flatOpt = flatSelect.options[flatSelect.selectedIndex];
        var tower = flatOpt && flatOpt.dataset ? flatOpt.dataset.tower : '';
        var flatNumber = flatOpt && flatOpt.dataset ? flatOpt.dataset.flatNumber : '';
        var password = document.getElementById('password').value;
        if (!societyId || !name || !email || !tower || !flatNumber || !password || password.length < 6) {
          err.textContent = 'Please fill all required fields including Society, Tower and Flat. Password min 6 characters.';
          err.classList.add('show');
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Submitting…';
        fetch(url('/signup-requests'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            societyId: societyId,
            name: name,
            email: email,
            phone: phone || undefined,
            tower: tower,
            flatNumber: flatNumber,
            password: password,
          }),
        })
          .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
          .then(function (result) {
            if (result.ok && result.data.success) {
              document.getElementById('formCard').style.display = 'none';
              document.getElementById('successCard').style.display = 'block';
              if (result.data.data && result.data.data.message) {
                document.getElementById('successMsg').textContent = result.data.data.message;
              }
            } else {
              err.textContent = (result.data && result.data.message) || 'Request failed. Try again.';
              err.classList.add('show');
              btn.disabled = false;
              btn.textContent = 'Submit request';
            }
          })
          .catch(function () {
            err.textContent = 'Network error. Please try again.';
            err.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Submit request';
          });
      });
    })();
  </script>
</body>
</html>
