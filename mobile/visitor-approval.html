<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <base href="/mobile/">
  <title>Visitor at gate | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
  <style>
    .approval-screen { background: #0f0f0f; min-height: 100vh; padding: max(env(safe-area-inset-top), 20px) 24px  max(env(safe-area-inset-bottom), 32px); display: flex; flex-direction: column; align-items: center; text-align: center; color: #fff; max-width: 480px; margin: 0 auto; }
    .approval-screen .ap-header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 40px; }
    .approval-screen .ap-logo { width: 36px; height: 36px; border-radius: 10px; background: #7c3aed; color: #fff; font-size: 0.75rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .approval-screen .ap-title { font-size: 1rem; font-weight: 700; }
    .approval-screen .ap-photo { width: 120px; height: 120px; border-radius: 50%; background: #333; margin: 0 auto 16px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #666; }
    .approval-screen .ap-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
    .approval-screen .ap-status { font-size: 0.95rem; color: #9ca3af; margin-bottom: 32px; }
    .approval-screen .ap-actions { display: flex; gap: 20px; justify-content: center; margin-bottom: 40px; }
    .approval-screen .ap-btn-circle { width: 64px; height: 64px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; text-decoration: none; color: #fff; }
    .approval-screen .ap-btn-circle.call { background: #374151; }
    .approval-screen .ap-btn-circle.deny { background: #dc2626; }
    .approval-screen .ap-swipe { width: 100%; max-width: 320px; height: 56px; border-radius: 28px; background: #059669; color: #fff; border: none; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1rem; font-weight: 700; margin: 0 auto; }
    .approval-screen .ap-swipe i { font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="approval-screen">
    <div class="ap-header">
      <span class="ap-logo">SH</span>
      <span class="ap-title">SocietyHub</span>
      <span style="width:36px;"></span>
    </div>
    <div class="ap-photo"><i class="fas fa-user"></i></div>
    <h1 class="ap-name">Bruno Stevenson</h1>
    <p class="ap-status">Guest waiting at gate</p>
    <div class="ap-actions">
      <a href="tel:+919876543210" class="ap-btn-circle call" aria-label="Call at gate"><i class="fas fa-phone"></i></a>
      <button type="button" class="ap-btn-circle deny" aria-label="Deny"><i class="fas fa-times"></i></button>
    </div>
    <button type="button" class="ap-swipe"><i class="fas fa-chevron-right"></i><i class="fas fa-chevron-right"></i><i class="fas fa-chevron-right"></i> Swipe to allow</button>
  </div>
</body>
</html>
