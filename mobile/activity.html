<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <base href="/mobile/">
  <title>Activity | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
</head>
<body>
  <script src="api.js"></script>
  <script src="auth-gate.js"></script>
  <div class="app-shell">
    <header class="app-bar">
      <a href="index.html" class="logo">SH</a>
      <h1 class="title">Activity</h1>
      <a href="profile.html" class="avatar" id="headerAvatar">R</a>
    </header>
    <main class="app-content">
      <p class="page-sub" style="margin-bottom:16px;">Recent visitors and deliveries for <strong>your flat</strong> only.</p>
      <div id="actLoading" class="empty-state" style="padding:24px; display:none;"><p class="es-text">Loading…</p></div>
      <div id="actEmpty" class="empty-state" style="padding:24px; display:none;"><p class="es-text">Nothing recent. Pre-approve a visitor from Home.</p></div>
      <ul class="card-list" id="actList" style="list-style:none; padding:0; margin:0;"></ul>
    </main>
    <nav class="tab-bar">
      <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="activity.html" class="active"><i class="fas fa-clock"></i><span>Activity</span></a>
      <a href="visitors.html"><i class="fas fa-user-friends"></i><span>Visitors</span></a>
      <a href="more.html"><i class="fas fa-ellipsis-h"></i><span>More</span></a>
    </nav>
  </div>
  <script>
    (function () {
      var u = window.MobileAPI.getUser();
      if (u && u.name) {
        var a = document.getElementById('headerAvatar');
        if (a) a.textContent = (u.name.trim().charAt(0) || 'R').toUpperCase();
      }
      var loading = document.getElementById('actLoading');
      var empty = document.getElementById('actEmpty');
      var list = document.getElementById('actList');
      loading.style.display = 'block';
      window.MobileAPI.apiGet('/app/activity').then(function (r) {
        loading.style.display = 'none';
        var payload = window.MobileAPI.dataFrom(r);
        var items = (payload && payload.items) ? payload.items : [];
        if (!items.length) { empty.style.display = 'block'; return; }
        items.forEach(function (it) {
          var li = document.createElement('li');
          li.style.cssText = 'display:flex; align-items:flex-start; gap:14px; padding:16px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:10px; border:1px solid var(--border);';
          var icon = it.kind === 'delivery' ? 'fa-box' : 'fa-user';
          var timeStr = it.atTime ? new Date(it.atTime).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }) : '';
          var phoneBtn = it.phone ? '<a href="tel:' + String(it.phone).replace(/\s/g, '') + '" style="display:inline-flex; margin-top:10px; padding:8px 14px; background:var(--primary); color:#fff; border-radius:var(--radius-sm); font-size:0.85rem; font-weight:600; text-decoration:none;"><i class="fas fa-phone"></i> Call</a>' : '';
          li.innerHTML = '<div style="width:48px; height:48px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;"><i class="fas ' + icon + '"></i></div><div style="flex:1; min-width:0;"><div style="font-weight:700;">' + String(it.title || '').replace(/</g, '&lt;') + '</div><div style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;">' + String(it.subtitle || '').replace(/</g, '&lt;') + '</div><div style="font-size:0.75rem; color:var(--text-secondary); margin-top:4px;">' + timeStr + ' · ' + String(it.detail || '').replace(/</g, '&lt;') + '</div>' + phoneBtn + '</div>';
          list.appendChild(li);
        });
      }).catch(function () {
        loading.style.display = 'none';
        empty.style.display = 'block';
        empty.querySelector('.es-text').textContent = 'Unable to load activity.';
      });
    })();
  </script>
</body>
</html>
