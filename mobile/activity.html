<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <base href="/mobile/">
  <title>Activity | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
</head>
<body>
  <script src="api.js"></script>
  <script src="auth-gate.js"></script>
  <div class="app-shell">
    <header class="app-bar">
      <a href="index.html" class="logo">SH</a>
      <h1 class="title">Activity</h1>
      <div class="notif-wrap">
        <button type="button" class="icon-btn"><i class="fas fa-bell"></i></button>
        <span class="notif-badge">2</span>
      </div>
      <a href="profile.html" class="avatar">R</a>
    </header>
    <main class="app-content">
      <div class="segments">
        <a href="#" class="active">Today</a>
        <a href="#">Upcoming</a>
      </div>
      <ul class="card-list" style="list-style:none; padding:0; margin:0;">
        <li style="display:flex; align-items:flex-start; gap:14px; padding:16px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:10px; border:1px solid var(--border);">
          <div style="width:48px; height:48px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;"><i class="fas fa-user"></i></div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700; margin-bottom:4px;">Guest | John Doe</div>
            <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">10:45 AM · GatePass #2847</div>
            <span style="display:inline-block; font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:12px; background:var(--success-bg); color:var(--success);">PRE APPROVED</span>
            <div style="margin-top:12px; display:flex; gap:10px;">
              <a href="tel:+919876543210" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:var(--primary); color:#fff; border-radius:var(--radius-sm); font-size:0.85rem; font-weight:600; text-decoration:none;"><i class="fas fa-phone"></i> Call</a>
              <button type="button" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:var(--bg-body); color:var(--text-muted); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:0.85rem;"><i class="fas fa-trash-alt"></i> Delete</button>
            </div>
          </div>
        </li>
        <li style="display:flex; align-items:flex-start; gap:14px; padding:16px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:10px; border:1px solid var(--border);">
          <div style="width:48px; height:48px; border-radius:50%; background:#ede9fe; color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;"><i class="fas fa-user-cog"></i></div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700; margin-bottom:4px;">Maid | Priya S.</div>
            <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">9:00 AM · GatePass #2846</div>
            <span style="display:inline-block; font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:12px; background:#ede9fe; color:var(--primary);">INSIDE</span>
            <div style="margin-top:12px;">
              <a href="tel:+919876543211" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:var(--primary); color:#fff; border-radius:var(--radius-sm); font-size:0.85rem; font-weight:600; text-decoration:none;"><i class="fas fa-phone"></i> Call</a>
            </div>
          </div>
        </li>
        <li style="display:flex; align-items:flex-start; gap:14px; padding:16px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:10px; border:1px solid var(--border);">
          <div style="width:48px; height:48px; border-radius:50%; background:#dbeafe; color:#1d4ed8; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;"><i class="fas fa-box"></i></div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700; margin-bottom:4px;">Delivery | Amazon</div>
            <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">10:35 AM · At gate · OTP 4829</div>
            <span style="display:inline-block; font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:12px; background:var(--warning-bg); color:var(--warning);">AT GATE</span>
          </div>
        </li>
      </ul>
    </main>
    <nav class="tab-bar">
      <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="activity.html" class="active"><i class="fas fa-clock"></i><span>Activity</span></a>
      <a href="visitors.html"><i class="fas fa-user-friends"></i><span>Visitors</span></a>
      <a href="more.html"><i class="fas fa-ellipsis-h"></i><span>More</span></a>
    </nav>
  </div>
</body>
</html>
