<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563EB">
  <base href="/mobile/">
  <title>Complaint details | SocietyHub</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="mobile.css" rel="stylesheet">
</head>
<body>
  <script src="api.js"></script>
  <script src="auth-gate.js"></script>
  <div class="app-shell">
    <header class="app-bar">
      <a href="complaints.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <h1 class="title">Complaint</h1>
    </header>
    <main class="app-content no-tabs">
      <div id="detailLoading" class="empty-state" style="padding:24px;"><p class="es-text">Loading…</p></div>
      <div id="detailContent" style="display:none;">
        <span class="ic-badge" id="detailBadge">Open</span>
        <h2 class="page-heading" style="margin-top:12px;" id="detailTitle"></h2>
        <p class="page-sub" style="margin-top:4px;" id="detailMeta"></p>
        <div class="notice-card" style="margin-top:16px;">
          <div class="nc-title">Description</div>
          <p class="nc-body" style="margin:0;" id="detailDesc"></p>
        </div>
        <div class="profile-block" style="margin-top:16px;" id="detailTimeline">
          <div class="pb-title">Status</div>
          <div class="profile-row"><span class="pr-label" id="detailCreatedLabel">Raised</span><span class="pr-value" id="detailCreatedVal"></span></div>
          <div class="profile-row" id="detailResolvedRow" style="display:none;"><span class="pr-label">Resolved</span><span class="pr-value" id="detailResolvedVal"></span></div>
        </div>
      </div>
      <div id="detailError" class="empty-state" style="padding:24px; display:none;"><p class="es-text">Complaint not found.</p></div>
    </main>
  </div>
  <script>
    (function(){
      var id = (new URLSearchParams(window.location.search).get('id')) || '';
      if (!id) { document.getElementById('detailLoading').style.display = 'none'; document.getElementById('detailError').style.display = 'block'; document.getElementById('detailError').querySelector('.es-text').textContent = 'Invalid complaint.'; return; }
      window.MobileAPI.apiGet('/complaints/' + id).then(function(r){
        var c = window.MobileAPI.dataFrom(r);
        document.getElementById('detailLoading').style.display = 'none';
        if (!c || (typeof c.id === 'undefined' && !c.title)) { document.getElementById('detailError').style.display = 'block'; return; }
        document.getElementById('detailContent').style.display = 'block';
        var statusClass = c.status === 'resolved' ? 'resolved' : 'in-progress';
        var statusLabel = c.status === 'resolved' ? 'Resolved' : (c.status === 'in_progress' ? 'In progress' : 'Open');
        document.getElementById('detailBadge').textContent = statusLabel;
        document.getElementById('detailBadge').className = 'ic-badge ' + statusClass;
        document.getElementById('detailTitle').textContent = c.title || '';
        document.getElementById('detailMeta').textContent = 'Raised ' + (c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-IN') : '') + '. Category: ' + (c.category || 'General') + '.';
        document.getElementById('detailDesc').textContent = c.description || '';
        document.getElementById('detailCreatedLabel').textContent = 'Raised';
        document.getElementById('detailCreatedVal').textContent = c.createdAt ? new Date(c.createdAt).toLocaleString('en-IN') : '';
        if (c.resolvedAt) {
          document.getElementById('detailResolvedRow').style.display = '';
          document.getElementById('detailResolvedVal').textContent = new Date(c.resolvedAt).toLocaleString('en-IN');
        }
      }).catch(function(){ document.getElementById('detailLoading').style.display = 'none'; document.getElementById('detailError').style.display = 'block'; });
    })();
  </script>
</body>
</html>
